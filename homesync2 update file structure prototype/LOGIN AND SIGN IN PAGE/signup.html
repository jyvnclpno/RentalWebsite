<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — HomeSync</title>
  <link rel="stylesheet" href="../ASSETS/css/forms.css">
  <link rel="stylesheet" href="../ASSETS/css/navigation and footer.css">
  <link rel="stylesheet" href="../ASSETS/css/auth.css">
  <link rel="stylesheet" href="../ASSETS/css/buttons.css">
</head>
<body>

  <nav>
    <a class="logo" href="../LANDING PAGE/index.html">Home<span>Sync</span></a>
    <div class="nav-links">
      <a href="../LANDING PAGE/index.html">Home</a>
      <a href="#">About Us</a>
      <a href="#">Contacts</a>
    </div>
    <div>
      <a href="login.html"><button class="btn-login">Login</button></a>
      <a href="signup.html"><button class="btn-signup">Sign Up</button></a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card" style="max-width: 500px;">
      <h2>Create account</h2>
      <p class="auth-sub">Already have an account? <a href="login.html">Sign in</a></p>

      <p style="font-size: 12px; font-weight: bold; margin-bottom: 8px;">Register as:</p>
      <div class="role-sel">
        <a href="#" class="role-opt selected" data-role="tenant">👤 Tenant</a>
        <a href="#" class="role-opt" data-role="landlord">🏠 Landlord</a>
      </div>

      <form id="signup-form">
        <div class="form-group">
          <label>Submit Valid ID</label>
          <input type="file" accept="image/*,.pdf" required>
        </div>

        <div id="landlord-only-fields" style="display: none;">
          <div class="form-group">
            <label>Business Permit / Mayor's Permit</label>
            <input type="file" id="business-permit" accept="image/*,.pdf">
          </div>
          <div class="form-group">
            <label>Location of Apartment / Boarding House</label>
            <input type="text" id="property-location" placeholder="Street, Barangay, City">
          </div>
        </div>

        <div class="form-row" style="display: flex; gap: 10px;">
          <div class="form-group" style="flex: 1;">
            <label>Birthday</label>
            <input type="date" required>
          </div>
          <div class="form-group" style="flex: 1;">
            <label>Age</label>
            <input type="number" placeholder="0" min="18" required>
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="email@example.com" required>
        </div>

        <div class="form-row" style="display: flex; gap: 10px;">
          <div class="form-group" style="flex: 1;">
            <label>Password</label>
            <input type="password" placeholder="********" required>
          </div>
          <div class="form-group" style="flex: 1;">
            <label>Confirm Password</label>
            <input type="password" placeholder="********" required>
          </div>
        </div>

        <div class="form-group">
          <label>Occupation Status</label>
          <select id="occupation-select" required>
            <option value="" disabled selected>Select status</option>
            <option value="employed">Employed</option>
            <option value="unemployed">Unemployed</option>
            <option value="undergrad">Undergrad (Student)</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group" id="other-occupation-group" style="display: none;">
          <label>Please specify occupation</label>
          <input type="text" id="other-occupation" placeholder="Your occupation">
        </div>

        <div class="form-group">
          <label id="income-label">Monthly Salary</label>
          <input type="number" placeholder="₱ 0.00" required>
        </div>

        <button type="submit" class="btn-green-full">Create Account</button>
      </form>

      <a class="back-link" href="../index.html">← Back to home</a>
    </div>
  </div>

  <script src="../ASSETS/js/signup.js"></script>
</body>
</html>
